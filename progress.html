<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Financial Progress</title>
<script type="module" src="js/main.js"></script>

<style>
    body {
        background-color: rgba(55, 65, 81, 1);
        font-family: Arial, sans-serif;
        margin: 0;
    }

    .container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .progress-container {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
    }

    #percentage {
        color: white;
        font-size: 2rem;
        margin-left: 2rem;
    }

    #progress {
        height: 20px;
        width: 30%;
    }

    #countdown-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 2rem;
        color: white;
    }

    #countdown {
        font-size: 1.2rem;
    }

    /* Configuration form */
    #config-form {
        display: none;
        color: white;
        width: 400px;
        max-width: 90vw;
    }

    #config-form .form-group {
        margin-bottom: 1.2rem;
    }

    #config-form label {
        display: block;
        margin-bottom: 0.4rem;
        font-size: 0.9rem;
        color: rgba(209, 213, 219, 1);
    }

    #config-form input[type="text"],
    #config-form input[type="number"] {
        width: 100%;
        padding: 0.5rem 0.6rem;
        border: 1px solid rgba(107, 114, 128, 1);
        border-radius: 4px;
        background: rgba(31, 41, 55, 1);
        color: white;
        font-size: 0.95rem;
        box-sizing: border-box;
    }

    #config-form input:focus {
        outline: none;
        border-color: rgba(99, 102, 241, 1);
    }

    #config-form .suffix {
        color: rgba(156, 163, 175, 1);
        font-size: 0.85rem;
        margin-left: 0.4rem;
    }

    #config-form .input-with-suffix {
        display: flex;
        align-items: center;
    }

    #config-form .input-with-suffix input {
        flex: 1;
    }

    #portfolio-fields .portfolio-row {
        display: flex;
        align-items: center;
        margin-bottom: 0.4rem;
        gap: 0.4rem;
        flex-wrap: wrap;
    }

    #portfolio-fields .portfolio-row input {
        flex: 1;
    }

    .portfolio-status {
        width: 100%;
        font-size: 0.8rem;
        min-height: 1.2em;
        color: rgba(156, 163, 175, 1);
    }

    .portfolio-status.validating {
        color: rgba(156, 163, 175, 1);
    }

    .portfolio-status.valid {
        color: rgba(74, 222, 128, 1);
    }

    .portfolio-status.invalid {
        color: rgba(248, 113, 113, 1);
    }

    .status-icon {
        font-weight: bold;
    }

    #config-form button {
        padding: 0.4rem 0.8rem;
        border: 1px solid rgba(107, 114, 128, 1);
        border-radius: 4px;
        background: rgba(55, 65, 81, 1);
        color: white;
        cursor: pointer;
        font-size: 0.85rem;
    }

    #config-form button:hover {
        background: rgba(75, 85, 99, 1);
    }

    #config-form .btn-remove {
        padding: 0.4rem 0.6rem;
        background: rgba(127, 29, 29, 0.6);
        border-color: rgba(153, 27, 27, 0.8);
        font-size: 0.8rem;
        line-height: 1;
    }

    #config-form .btn-remove:hover {
        background: rgba(153, 27, 27, 0.8);
    }

    #config-form .btn-add {
        margin-top: 0.2rem;
        font-size: 0.85rem;
    }

    #config-form .btn-save {
        margin-top: 0.8rem;
        padding: 0.6rem 1.6rem;
        background: rgba(79, 70, 229, 1);
        border-color: rgba(99, 102, 241, 1);
        font-size: 1rem;
        width: 100%;
    }

    #config-form .btn-save:hover {
        background: rgba(99, 102, 241, 1);
    }
</style>
</head>

<body>
    <div class="container">
        <div class="progress-container">
            <progress id="progress" max="100" value="0"></progress><span id="percentage"></span>
        </div>
        <div id="countdown-container" style="display: none;">
            <p id="countdown"></p>
        </div>

        <form id="config-form">
            <div class="form-group">
                <label>Portfolio IDs</label>
                <div id="portfolio-fields"></div>
                <button type="button" id="btn-add-portfolio" class="btn-add">+ Add portfolio</button>
            </div>

            <div class="form-group">
                <label for="input-target-value">Target Value</label>
                <div class="input-with-suffix">
                    <input type="number" id="input-target-value" min="10" step="1">
                    <span class="suffix">EUR</span>
                </div>
            </div>

            <div class="form-group">
                <label for="input-yearly-return">Assumed Yearly Return</label>
                <div class="input-with-suffix">
                    <input type="text" id="input-yearly-return" inputmode="decimal">
                    <span class="suffix">%</span>
                </div>
            </div>

            <div class="form-group">
                <label for="input-monthly-contribution">Monthly Contribution</label>
                <div class="input-with-suffix">
                    <input type="number" id="input-monthly-contribution" min="0" step="1">
                    <span class="suffix">EUR</span>
                </div>
            </div>

            <button type="submit" class="btn-save">Save</button>
        </form>
    </div>
</body>

</html>
